<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥤 辦公室下午茶訂購系統</title>
    <!-- 引入 Tailwind CSS 確保排版與置中 -->
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-center flex flex-col justify-between">

    <main class="max-w-2xl w-full mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8 space-y-6">
        <!-- 標題區 -->
        <div>
            <h1 class="text-2xl font-bold text-slate-800 mb-1">🥤 週五下午茶 · 飲料點起來！</h1>
            <p class="text-sm text-slate-500">今日精選店家：【50嵐】| 請在下午 3:00 前完成填寫</p>
        </div>

        <!-- 點餐輸入表單 -->
        <form id="orderForm" class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-left space-y-4" onsubmit="event.preventDefault(); addOrder();">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">1. 你的名字 (是誰要喝？)</label>
                <input type="text" id="userName" required placeholder="例如：小明" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:ring-2 focus:ring-amber-500 focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">2. 選擇飲料</label>
                    <select id="drinkName" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white">
                        <option value="珍珠奶茶" data-price="50">珍珠奶茶 ($50)</option>
                        <option value="四季春茶" data-price="35">四季春茶 ($35)</option>
                        <option value="燕麥拿鐵" data-price="65">燕麥拿鐵 ($65)</option>
                        <option value="冰淇淋紅茶" data-price="55">冰淇淋紅茶 ($55)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">3. 大小/數量</label>
                    <div class="flex gap-1">
                        <select id="drinkSize" class="w-1/2 border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white">
                            <option value="大杯">大杯</option>
                            <option value="中杯">中杯</option>
                        </select>
                        <input type="number" id="drinkQty" value="1" min="1" max="10" required class="w-1/2 border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">4. 甜度</label>
                    <select id="drinkSweet" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white">
                        <option value="正常糖">正常糖 (10分)</option>
                        <option value="少糖">少糖 (7分)</option>
                        <option value="半糖">半糖 (5分)</option>
                        <option value="微糖" selected>微糖 (3分)</option>
                        <option value="無糖">無糖 (0分)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">5. 冰塊</label>
                    <select id="drinkIce" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white">
                        <option value="正常冰">正常冰</option>
                        <option value="少冰">少冰</option>
                        <option value="微冰" selected>微冰</option>
                        <option value="去冰">去冰</option>
                        <option value="完全去冰">完全去冰</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium p-3 rounded-lg transition duration-200 shadow-md">
                ➕ 送出我的飲料訂單
            </button>
        </form>

        <!-- 即時統計總覽 -->
        <div class="border-t border-slate-200 pt-4">
            <h2 class="text-md font-bold text-slate-700 mb-3">📊 目前統計總覽</h2>
            <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-4">
                <div class="bg-amber-50 rounded-xl p-3 border border-amber-200">
                    <span class="text-xs text-amber-700 block">總杯數</span>
                    <span id="totalCups" class="text-xl font-bold text-amber-600">0 杯</span>
                </div>
                <div class="bg-emerald-50 rounded-xl p-3 border border-emerald-200">
                    <span class="text-xs text-emerald-700 block">預估總金額</span>
                    <span id="totalAmount" class="text-xl font-bold text-emerald-600">$0 元</span>
                </div>
            </div>

            <!-- 同事點餐明細表格 -->
            <div class="overflow-x-auto rounded-lg border border-slate-200">
                <table class="w-full text-sm text-center text-slate-600">
                    <thead class="text-xs text-slate-700 uppercase bg-slate-100">
                        <tr>
                            <th class="px-3 py-2">姓名</th>
                            <th class="px-3 py-2">品項</th>
                            <th class="px-3 py-2">客製化</th>
                            <th class="px-3 py-2">數量</th>
                            <th class="px-3 py-2">小計</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <!-- 點餐資料會動態呈現在這裡 -->
                        <tr id="emptyRow"><td colspan="5" class="py-4 text-slate-400">目前還沒有人點餐唷！</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- 一鍵複製統計結果按鈕 -->
            <button onclick="copySummary()" class="mt-4 text-xs bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg transition shadow">
                📋 一鍵複製訂單明細（方便傳 LINE 給店家）
            </button>
        </div>
    </main>

    <footer class="text-xs text-slate-400 mt-6">
        Powerby 辦公室大管家精神 · 網頁文字已全部置中
    </footer>

    <!-- 運作核心邏輯腳本 -->
    <script>
        let orders = [];

        function addOrder() {
            const name = document.getElementById('userName').value.trim();
            const drinkSelect = document.getElementById('drinkName');
            const drink = drinkSelect.value;
            const price = parseInt(drinkSelect.options[drinkSelect.selectedIndex].getAttribute('data-price'));
            const size = document.getElementById('drinkSize').value;
            const qty = parseInt(document.getElementById('drinkQty').value);
            const sweet = document.getElementById('drinkSweet').value;
            const ice = document.getElementById('drinkIce').value;

            // 新增一筆訂單資料
            orders.push({ name, drink, size, qty, sweet, ice, subtotal: price * qty });

            // 重新渲染畫面與統計
            renderTable();
            
            // 清空姓名欄位，方便下一位同事接著點
            document.getElementById('userName').value = '';
        }

        function renderTable() {
            const tbody = document.getElementById('orderTableBody');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                tbody.innerHTML = '<tr id="emptyRow"><td colspan="5" class="py-4 text-slate-400">目前還沒有人點餐唷！</td></tr>';
                document.getElementById('totalCups').innerText = '0 杯';
                document.getElementById('totalAmount').innerText = '$0 元';
                return;
            }

            let totalCups = 0;
            let totalAmount = 0;

            orders.forEach(item => {
                totalCups += item.qty;
                totalAmount += item.subtotal;

                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-slate-50";
                tr.innerHTML = `
                    <td class="px-3 py-2 font-medium text-slate-900">${item.name}</td>
                    <td class="px-3 py-2">${item.drink} (${item.size})</td>
                    <td class="px-3 py-2 text-xs text-slate-500">${item.sweet}/${item.ice}</td>
                    <td class="px-3 py-2">${item.qty}</td>
                    <td class="px-3 py-2 font-bold text-slate-700">$${item.subtotal}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalCups').innerText = totalCups + ' 杯';
            document.getElementById('totalAmount').innerText = '$' + totalAmount + ' 元';
        }

        function copySummary() {
            if(orders.length === 0) {
                alert('目前沒有訂單可以複製唷！');
                return;
            }
            let text = "📋 【今日下午茶訂單明細】\n\n";
            orders.forEach(item => {
                text += `${item.name}：${item.drink}(${item.size}) / ${item.sweet} / ${item.ice} x ${item.qty}杯 ($${item.subtotal})\n`;
            });
            text += `\n總計：${document.getElementById('totalCups').innerText}，總金額：${document.getElementById('totalAmount').innerText}`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('訂單明細已複製到剪貼簿！可以直接貼到 LINE 囉！');
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ 星巴克辦公室中央點餐系統</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-center flex flex-col justify-between" onload="loadOrders()">

    <main class="max-w-2xl w-full mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8 space-y-6">
        <!-- 標題區：星巴克經典綠色調 -->
        <div>
            <div class="inline-block bg-[#00704A] text-white text-xs font-bold px-3 py-1 rounded-full mb-2 tracking-wider">STARBUCKS COFFEE</div>
            <h1 class="text-2xl font-bold text-slate-800 mb-1">☕ 辦公室專屬 · 星巴克咖啡團購艙</h1>
            <p class="text-sm text-slate-500">同事填寫後會自動在下方即時統計杯數與金額</p>
        </div>

        <!-- 點餐輸入表單 -->
        <!-- 💡 記得把下面的 ACTION 網址改成你的 SheetMonkey 網址 -->
        <form id="orderForm" action="YOUR_SHEETMONKEY_URL_HERE" method="POST" class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-left space-y-4" onsubmit="handleSubmit(event)">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">1. 你的名字 (是誰要喝？)</label>
                <input type="text" name="name" id="userName" required placeholder="例如：主管小明" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:ring-2 focus:ring-[#00704A] focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">2. 選擇星巴克飲品</label>
                    <select name="drink" id="drinkName" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white" onchange="updateFormPrice()">
                        <!-- 精選台灣星巴克熱門經典菜單與特大杯預估價格 -->
                        <option value="那堤 (Latte)" data-price="150">那堤咖啡 ($150)</option>
                        <option value="焦糖瑪奇朵" data-price="170">焦糖瑪奇朵 ($170)</option>
                        <option value="每日精選咖啡" data-price="110">每日精選咖啡 ($110)</option>
                        <option value="美式咖啡" data-price="125">美式咖啡 ($125)</option>
                        <option value="黑摩卡可可星冰樂" data-price="165">黑摩卡可可星冰樂 ($165)</option>
                        <option value="經典紅茶那堤" data-price="145">經典紅茶那堤 ($145)</option>
                        <option value="阿里山烏龍茶" data-price="180">阿里山烏龍茶 ($180)</option>
                        <option value="香草風味星冰樂" data-price="145">香草風味星冰樂 ($145)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">3. 容量/數量</label>
                    <div class="flex gap-1">
                        <select name="size" id="drinkSize" class="w-1/2 border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white">
                            <option value="特大杯 Venti">特大杯 Venti</option>
                            <option value="大杯 Grande">大杯 Grande</option>
                            <option value="中杯 Tall">中杯 Tall</option>
                        </select>
                        <input type="number" name="qty" id="drinkQty" value="1" min="1" max="10" required class="w-1/2 border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none" onchange="updateFormPrice()">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">4. 甜度調整 (或風味糖漿)</label>
                    <select name="sweet" id="drinkSweet" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white">
                        <option value="正常甜" selected>正常風味 (按標準配方)</option>
                        <option value="少糖">少糖 (減甜)</option>
                        <option value="微糖">微糖 (微甜)</option>
                        <option value="無糖">不加糖 / 無糖漿</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">5. 冰塊量</label>
                    <select name="ice" id="drinkIce" class="w-full border border-slate-300 rounded-lg p-2 text-center text-slate-800 focus:outline-none bg-white">
                        <option value="正常冰">正常冰</option>
                        <option value="少冰" selected>少冰</option>
                        <option value="微冰">微冰</option>
                        <option value="去冰">去冰</option>
                        <option value="加熱">製成熱飲 (Hot)</option>
                    </select>
                </div>
            </div>

            <!-- 隱藏欄位：用來把計算好的總價一併傳給試算表 -->
            <input type="hidden" name="price" id="hiddenPrice" value="150">

            <button type="submit" id="submitBtn" class="w-full bg-[#00704A] hover:bg-[#00593a] text-white font-medium p-3 rounded-lg transition duration-200 shadow-md">
                ☕ 送出我的星巴克訂單
            </button>
        </form>

        <!-- 中央即時統計總覽 -->
        <div class="border-t border-slate-200 pt-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-md font-bold text-slate-700">📊 雲端即時統計總覽 (每10秒自動更新)</h2>
                <button onclick="loadOrders()" class="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded hover:bg-slate-300">🔄 手動更新</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-4">
                <div class="bg-emerald-50 rounded-xl p-3 border border-emerald-200">
                    <span class="text-xs text-emerald-700 block">總杯數</span>
                    <span id="totalCups" class="text-xl font-bold text-[#00704A]">讀取中...</span>
                </div>
                <div class="bg-slate-100 rounded-xl p-3 border border-slate-200">
                    <span class="text-xs text-slate-600 block">預估總金額</span>
                    <span id="totalAmount" class="text-xl font-bold text-slate-800">讀取中...</span>
                </div>
            </div>

            <!-- 同事點餐明細表格 -->
            <div class="overflow-x-auto rounded-lg border border-slate-200 max-h-60 overflow-y-auto">
                <table class="w-full text-sm text-center text-slate-600">
                    <thead class="text-xs text-slate-700 bg-slate-100 sticky top-0">
                        <tr>
                            <th class="px-3 py-2">姓名</th>
                            <th class="px-3 py-2">品項</th>
                            <th class="px-3 py-2">客製化</th>
                            <th class="px-3 py-2">數量</th>
                            <th class="px-3 py-2">小計</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <tr><td colspan="5" class="py-4 text-slate-400">正在從雲端同步訂單...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="text-xs text-slate-400 mt-6">
        Powerby 星巴克中央自動化系統 · 網頁文字已全部置中
    </footer>

    <script>
        function updateFormPrice() {
            const drinkSelect = document.getElementById('drinkName');
            const price = parseInt(drinkSelect.options[drinkSelect.selectedIndex].getAttribute('data-price'));
            const qty = parseInt(document.getElementById('drinkQty').value) || 1;
            document.getElementById('hiddenPrice').value = price * qty;
        }

        function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const form = document.getElementById('orderForm');
            
            btn.innerText = "⏳ 正在送入星巴克星擊點中...";
            btn.disabled = true;

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form)
            }).then(() => {
                alert('🎉 星巴克訂單已成功送到雲端統計！');
                document.getElementById('userName').value = '';
                btn.innerText = "☕ 送出我的星巴克訂單";
                btn.disabled = false;
                loadOrders(); 
            }).catch(err => {
                alert('送出失敗，請檢查網路或 SheetMonkey 網址。');
                btn.disabled = false;
            });
        }

        function loadOrders() {
            const formAction = document.getElementById('orderForm').action;
            if(formAction === "YOUR_SHEETMONKEY_URL_HERE") {
                document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="5" class="py-4 text-red-500">請先在程式碼中填入您的 SheetMonkey 網址！</td></tr>';
                return;
            }

            fetch(formAction + "/read")
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('orderTableBody');
                tbody.innerHTML = '';
                
                let orderList = data.data || [];
                
                if (orderList.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="py-4 text-slate-400">目前雲端還沒有人點餐唷！</td></tr>';
                    document.getElementById('totalCups').innerText = '0 杯';
                    document.getElementById('totalAmount').innerText = '$0 元';
                    return;
                }

                let totalCups = 0;
                let totalAmount = 0;

                orderList.forEach(item => {
                    let qty = parseInt(item.qty) || 0;
                    let price = parseInt(item.price) || 0;
                    totalCups += qty;
